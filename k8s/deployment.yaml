apiVersion: apps/v1
kind: Deployment
metadata:
  name: cicd-inventario-app
  labels:
    app: cicd-inventario-app
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: cicd-inventario-app  
  template:
    metadata:
      labels:
        app: cicd-inventario-app
    spec:
      containers:
        - name: app
          image: ghcr.io/whosstixi19/inventario-app:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: inventario-secret
                  key: API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 2
            periodSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
